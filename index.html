<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemenang Lucky Draw TAB 2026</title>
    
    <!-- Menggunakan Tailwind CSS untuk styling yang modern dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Menggunakan PapaParse untuk membaca file CSV dari URL dengan mudah -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Lucide Icons untuk ikon -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Tambahan styling kustom jika diperlukan */
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .img-loading {
            background: #f3f4f6 url('https://cdnjs.cloudflare.com/ajax/libs/galleriffic/2.0.1/css/loader.gif') no-repeat center center;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <!-- Header Aplikasi -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-2 rounded-lg shadow-sm">
                        <i data-lucide="gift" class="text-blue-600 w-8 h-8"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-white tracking-tight">Pemenang Lucky Draw</h1>
                        <p class="text-blue-100 text-sm font-medium">TAB 2026</p>
                    </div>
                </div>
                
                <!-- Logo & Tombol Aksi Kanan Atas -->
                <div class="flex items-center gap-3 sm:gap-4 flex-shrink-0">
                    <!-- Tombol Refresh -->
                    <button onclick="loadData()" title="Muat Ulang Data" class="p-2 sm:p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-full transition-all duration-500 backdrop-blur-sm border border-white/20 hover:rotate-180 focus:outline-none focus:ring-2 focus:ring-white/50">
                        <i data-lucide="refresh-cw" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                    </button>

                    <img 
                        src="https://lh3.googleusercontent.com/d/1dyed9YL6QxBSDefdx47sf8pWXUVWD3nc" 
                        onerror="this.onerror=null; this.src='https://drive.google.com/thumbnail?id=1dyed9YL6QxBSDefdx47sf8pWXUVWD3nc&sz=w400';"
                        alt="Logo TAB 2026" 
                        class="h-16 sm:h-20 w-auto object-contain drop-shadow-md bg-white/10 p-2 rounded-xl backdrop-blur-sm border border-white/20"
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- Konten Utama -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Indikator Loading -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <i data-lucide="loader-2" class="w-12 h-12 text-blue-500 animate-spin mb-4"></i>
            <p class="text-gray-500 font-medium animate-pulse">Memuat data pemenang dari server...</p>
        </div>

        <!-- Pesan Error (Tersembunyi secara default) -->
        <div id="error-state" class="hidden flex-col items-center justify-center py-20 text-center">
            <i data-lucide="alert-circle" class="w-16 h-16 text-red-500 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Gagal Memuat Data</h2>
            <p id="error-message" class="text-gray-600 max-w-md">Terjadi kesalahan saat mengambil data CSV. Pastikan link sudah dipublikasikan ke web.</p>
            <button onclick="loadData()" class="mt-6 px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors shadow-md">
                Coba Lagi
            </button>
        </div>

        <!-- Grid Galeri -->
        <div id="gallery-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Kartu data akan dimasukkan ke sini oleh JavaScript -->
        </div>

        <!-- Status Kosong -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20">
            <i data-lucide="image-off" class="w-16 h-16 text-gray-400 mb-4"></i>
            <h2 class="text-xl font-medium text-gray-600">Belum ada data pemenang</h2>
        </div>
    </main>

    <!-- Modal / Lightbox Pop-up -->
    <div id="image-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity p-4" onclick="if(event.target === this) closeModal()">
        <button onclick="closeModal()" class="absolute top-4 right-4 md:top-8 md:right-8 p-3 text-white bg-white/10 hover:bg-white/20 rounded-full transition-colors z-50">
            <i data-lucide="x" class="w-6 h-6 md:w-8 md:h-8"></i>
        </button>
        <div class="relative flex flex-col items-center w-full max-w-lg">
            <img id="modal-image" src="" alt="Full view" class="w-full h-auto max-h-[85vh] object-contain rounded-xl shadow-2xl bg-gray-900/50">
            <p id="modal-title" class="text-white text-center mt-4 font-semibold text-lg md:text-xl max-w-md truncate"></p>
        </div>
    </div>

    <!-- Script Logika Aplikasi -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQs-HvfOGc1iH5Y-5sV3HyDUt3TB0fO7FAF-f5XhqDIaHeH70WcAJ6bA8pL9yW4SvY4Gok32M0fI4Kz/pub?gid=0&single=true&output=csv';

        // Fungsi untuk mengambil ID dari link Google Drive
        function extractDriveId(url) {
            if (!url) return null;
            // Mencocokkan ID Google Drive (biasanya panjang karakter unik)
            const match = url.match(/[-\w]{25,}/);
            return match ? match[0] : null;
        }

        // Referensi elemen DOM
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const emptyState = document.getElementById('empty-state');
        const galleryGrid = document.getElementById('gallery-grid');
        const errorMessage = document.getElementById('error-message');

        // Referensi elemen Modal
        const imageModal = document.getElementById('image-modal');
        const modalImage = document.getElementById('modal-image');
        const modalTitle = document.getElementById('modal-title');

        // Fungsi membuka modal
        function openModal(primaryUrl, secondaryUrl, fallbackUrl, title) {
            imageModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Mencegah scroll background
            
            // Set gambar dengan logika multi-fallback yang sama
            modalImage.onerror = function() {
                this.onerror = function() {
                    this.onerror = null;
                    this.src = fallbackUrl;
                };
                this.src = secondaryUrl;
            };
            
            modalImage.src = primaryUrl;
            modalTitle.textContent = title;
        }

        // Fungsi menutup modal
        function closeModal() {
            imageModal.classList.add('hidden');
            document.body.style.overflow = ''; // Mengembalikan scroll
            setTimeout(() => { modalImage.src = ''; }, 300); // Bersihkan src setelah animasi tertutup
        }

        // Menutup modal dengan tombol Escape di keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !imageModal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // Fungsi utama untuk memuat data
        function loadData() {
            // Reset tampilan
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            galleryGrid.classList.add('hidden');
            emptyState.classList.add('hidden');
            galleryGrid.innerHTML = '';

            Papa.parse(CSV_URL, {
                download: true,
                header: false, // Kita asumsikan menggunakan index kolom (0, 1, 2)
                skipEmptyLines: true,
                complete: function(results) {
                    loadingState.classList.add('hidden');
                    
                    const data = results.data;
                    
                    // Cek jika data kosong atau hanya berisi baris header
                    if (!data || data.length <= 1) {
                        emptyState.classList.remove('hidden');
                        emptyState.classList.add('flex');
                        return;
                    }

                    // Menghapus baris pertama jika itu adalah header teks
                    // (Asumsi: baris pertama selalu header)
                    const isHeader = isNaN(Date.parse(data[0][0])) && !data[0][2].includes('http');
                    const rowsToProcess = isHeader ? data.slice(1) : data;

                    let validItemCount = 0;

                    rowsToProcess.forEach((row, index) => {
                        // Pastikan baris memiliki minimal 3 kolom
                        if (row.length >= 3) {
                            const dateStr = row[0] ? row[0].trim() : 'Tanggal tidak diketahui';
                            const photoId = row[1] ? row[1].trim() : 'Tanpa Nama';
                            const driveLink = row[2] ? row[2].trim() : '';

                            if (driveLink) {
                                validItemCount++;
                                const driveId = extractDriveId(driveLink);
                                renderCard(dateStr, photoId, driveId, driveLink, index);
                            }
                        }
                    });

                    if (validItemCount > 0) {
                        galleryGrid.classList.remove('hidden');
                    } else {
                        emptyState.classList.remove('hidden');
                        emptyState.classList.add('flex');
                    }
                },
                error: function(err) {
                    console.error("Gagal membaca CSV:", err);
                    loadingState.classList.add('hidden');
                    errorState.classList.remove('hidden');
                    errorState.classList.add('flex');
                }
            });
        }

        // Fungsi untuk membuat elemen HTML kartu dengan multi-layer fallback
        function renderCard(date, title, driveId, originalLink, index) {
            const card = document.createElement('div');
            card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 opacity-0 group";
            card.style.animation = `fadeIn 0.5s ease forwards ${index * 0.1}s`;

            // Rasio ukuran story (9:16) untuk placeholder
            const fallbackImage = `https://placehold.co/600x1066/f3f4f6/a1a1aa?text=Privasi+Akun/File+Dibatasi`;
            
            // Server 1: Menggunakan lh3 server milik google yang paling diizinkan
            const primaryImgUrl = driveId ? `https://lh3.googleusercontent.com/d/${driveId}` : originalLink;
            // Server 2: Menggunakan thumbnail API sebagai cadangan kedua
            const secondaryImgUrl = driveId ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000` : fallbackImage;

            // Logika onerror: Jika primary gagal, coba secondary. Jika secondary gagal, tampilkan fallback.
            card.innerHTML = `
                <div id="img-container-${index}" class="relative aspect-[9/16] overflow-hidden bg-gray-100 img-loading cursor-pointer">
                    <img 
                        src="${primaryImgUrl}" 
                        alt="${title}" 
                        referrerpolicy="no-referrer"
                        onerror="this.onerror=function(){ this.onerror=null; this.src='${fallbackImage}'; this.parentElement.classList.remove('img-loading'); }; this.src='${secondaryImgUrl}';"
                        onload="this.parentElement.classList.remove('img-loading');"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                        loading="lazy"
                    >
                    <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <div class="bg-white/90 rounded-full p-4 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-xl">
                            <i data-lucide="zoom-in" class="w-6 h-6 text-blue-600"></i>
                        </div>
                    </div>
                </div>
                <div class="p-5">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="calendar" class="w-4 h-4 text-blue-500"></i>
                        <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider">${date}</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 leading-tight truncate" title="${title}">${title}</h3>
                </div>
            `;
            galleryGrid.appendChild(card);
            
            // Tambahkan event listener untuk Pop-up saat gambar diklik
            const imgContainer = card.querySelector(`#img-container-${index}`);
            imgContainer.addEventListener('click', () => {
                openModal(primaryImgUrl, secondaryImgUrl, fallbackImage, title);
            });
            
            // Re-inisialisasi ikon lucide untuk kartu yang baru ditambahkan
            lucide.createIcons({
                root: card
            });
        }

        // Menambahkan style animasi kustom
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Jalankan saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', loadData);

    </script>
</body>
</html>
